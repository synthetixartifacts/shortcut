name: Feature request
description: Suggest an enhancement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is the user problem you are trying to solve? Who experiences it, and when?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should ShortCut do? Include UI, behavior, and any tradeoffs you've thought about.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you prefer the one above?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
